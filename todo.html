<!-- Task Manager - Student Project -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager - Student Project</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* CSS Variables */
    :root { color-scheme: dark; }

    /* Video Background */

    body {
      margin: 0;
      min-height: 100vh;
      color: #f8fafc;
      background: #020202;
      overflow-x: hidden;
    }

    .page-video {
      /* Full screen video positioning */
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      z-index: -2;
      pointer-events: none;
      opacity: 0.8;
      object-fit: cover;
    }

    .page-video-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 90, 31, 0.15), transparent 25%),
        radial-gradient(circle at 80% 80%, rgba(37, 99, 235, 0.12), transparent 30%),
        linear-gradient(180deg, rgba(2, 2, 2, 0.3) 0%, rgba(9, 22, 61, 0.2) 60%, rgba(10, 31, 97, 0.25) 100%);
      mix-blend-mode: multiply;
    }

    /* Main Card Styling */
    .project-card {
      position: relative;
      background: rgba(7, 10, 24, 0.72);
      border: 1px solid rgba(255, 122, 34, 0.18);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
    }

    .project-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255, 122, 34, 0.4), rgba(255, 255, 255, 0.06), rgba(37, 99, 235, 0.28));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Task Input Field */
    .task-input {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.08);
      color: #f8fafc;
    }

    .task-input::placeholder { color: rgba(248, 250, 252, 0.45); }

    .task-input:focus {
      border-color: rgba(255, 122, 34, 0.65) !important;
      box-shadow: 0 0 0 3px rgba(255, 122, 34, 0.16);
    }

    /* Add Button */
    .task-button {
      background: linear-gradient(135deg, #ff6f1c 0%, #ff8a24 100%);
      box-shadow: 0 10px 30px rgba(255, 111, 28, 0.28);
    }

    .task-button:hover {
      background: linear-gradient(135deg, #ff7a22 0%, #ff9832 100%);
    }

    /* Individual Task Items */
    .task-item {
      animation: fadeIn 0.2s ease;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #e2e8f0;
    }

    .task-item.completed span {
      text-decoration: line-through;
      color: #64748b;
    }

    .back-link { color: #ff9b63; }
    .back-link:hover { color: #ffb282; }

    .muted-copy { color: rgba(226, 232, 240, 0.6); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .page-video, .page-video-overlay { display: none !important; }
    }
  </style>
</head>
<body class="min-h-screen p-4">
  <!-- Static Video Background (paused) -->
  <video class="page-video" muted loop playsinline aria-hidden="true" preload="auto">
    <source src="background.mp4" type="video/mp4">
  </video>
  <div class="page-video-overlay" aria-hidden="true"></div>

  <!-- Main Content -->
  <div class="relative z-10 max-w-lg mx-auto pt-8 w-full">
    <!-- Back Link -->
    <a href="index.html#projects" class="back-link text-sm hover:underline mb-4 inline-block">&larr; Back to Portfolio</a>

    <!-- Task Manager Card -->
    <div class="project-card rounded-2xl p-6">
      <h1 class="text-2xl font-bold text-white mb-1">Task Manager</h1>
      <p class="muted-copy text-sm mb-6">My first JavaScript project</p>

      <!-- Add Task Form -->
      <div class="flex gap-2 mb-6">
        <input type="text" id="taskInput" placeholder="Add a new task..." class="task-input flex-1 px-4 py-2 border rounded-xl focus:outline-none">
        <button id="addBtn" class="task-button text-white px-4 py-2 rounded-xl transition-colors">Add</button>
      </div>

      <!-- Task List -->
      <ul id="taskList" class="space-y-2"></ul>

      <!-- Empty State Message -->
      <p id="emptyState" class="text-center muted-copy py-8">No tasks yet. Add one above!</p>

      <!-- Footer Stats -->
      <div class="border-t border-white/10 mt-6 pt-4 flex justify-between text-sm muted-copy">
        <span id="totalTasks">0 tasks</span>
        <button id="clearBtn" class="text-red-400 hover:text-red-300 hover:underline hidden">Clear all</button>
      </div>
    </div>
  </div>

  <!-- Task Manager Logic -->
  <script>
    // DOM Elements
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const taskList = document.getElementById('taskList');
    const emptyState = document.getElementById('emptyState');
    const totalTasks = document.getElementById('totalTasks');
    const clearBtn = document.getElementById('clearBtn');

    let tasks = [];

    function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;
      tasks.push({ id: Date.now(), text, completed: false });
      taskInput.value = '';
      render();
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (task) { task.completed = !task.completed; render(); }
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function clearAll() { tasks = []; render(); }

    function render() {
      taskList.innerHTML = '';

      if (tasks.length === 0) {
        emptyState.style.display = 'block';
        clearBtn.classList.add('hidden');
      } else {
        emptyState.style.display = 'none';
        clearBtn.classList.remove('hidden');

        tasks.forEach(task => {
          const li = document.createElement('li');
          li.className = `task-item flex items-center gap-3 p-3 rounded-xl ${task.completed ? 'completed' : ''}`;
          li.innerHTML = `
            <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})" class="w-5 h-5 accent-orange-500 cursor-pointer">
            <span class="flex-1">${task.text}</span>
            <button onclick="deleteTask(${task.id})" class="text-red-300 hover:text-red-200 text-sm">Delete</button>
          `;
          taskList.appendChild(li);
        });
      }

      totalTasks.textContent = `${tasks.length} task${tasks.length !== 1 ? 's' : ''}`;
    }

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTask(); });
    clearBtn.addEventListener('click', clearAll);
  </script>
</body>
</html>
