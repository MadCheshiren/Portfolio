<!-- Form Validator - Student Project -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Validator - Student Project</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* CSS Variables */
    :root { color-scheme: dark; }

    /* Video Background Styles */

    body {
      margin: 0;
      min-height: 100vh;
      color: #f8fafc;
      background: #020202;
      overflow-x: hidden;
    }

    .page-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      z-index: -2;
      pointer-events: none;
      opacity: 0.8;
      object-fit: cover;
    }

    .page-video-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 90, 31, 0.15), transparent 25%),
        radial-gradient(circle at 80% 80%, rgba(37, 99, 235, 0.12), transparent 30%),
        linear-gradient(180deg, rgba(2, 2, 2, 0.3) 0%, rgba(9, 22, 61, 0.2) 60%, rgba(10, 31, 97, 0.25) 100%);
      mix-blend-mode: multiply;
    }

    /* Main Form Card - Red/Violet/Blue Gradient */
    .project-card {
      position: relative;
      background: rgba(7, 10, 24, 0.74);
      border: 1px solid rgba(239, 68, 68, 0.2);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
    }

    .project-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.4), rgba(139, 92, 246, 0.3), rgba(37, 99, 235, 0.4));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Navigation Link */
    .back-link { color: #a78bfa; }
    .back-link:hover { color: #c4b5fd; }

    /* Form Input Fields */
    .field-input {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.08);
      color: #f8fafc;
    }

    .field-input::placeholder { color: rgba(248, 250, 252, 0.45); }

    .field-input:focus {
      border-color: rgba(139, 92, 246, 0.65) !important;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.16);
    }

    .field-label, .muted-copy { color: rgba(226, 232, 240, 0.72); }

    /* Submit Button - Red/Violet/Blue Gradient */
    .submit-button {
      background: linear-gradient(135deg, #ef4444 0%, #8b5cf6 50%, #3b82f6 100%);
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.28);
    }

    .submit-button:hover {
      background: linear-gradient(135deg, #f87171 0%, #a78bfa 50%, #60a5fa 100%);
      transform: translateY(-1px);
    }

    /* Success Message Panel */
    .success-panel {
      background: rgba(34, 197, 94, 0.12);
      border-color: rgba(34, 197, 94, 0.3);
      color: #bbf7d0;
    }

    /* Error Message Panel */
    .error-panel {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.3);
      color: #fecaca;
    }

    @media (prefers-reduced-motion: reduce) {
      .page-video, .page-video-overlay { display: none !important; }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <!-- Static Video Background -->
  <video class="page-video" muted loop playsinline aria-hidden="true" preload="auto">
    <source src="background.mp4" type="video/mp4">
  </video>
  <div class="page-video-overlay" aria-hidden="true"></div>

  <!-- Main Content -->
  <div class="relative z-10 max-w-lg mx-auto pt-8 w-full">
    <!-- Back to Portfolio Link -->
    <a href="index.html#projects" class="back-link text-sm hover:underline mb-4 inline-block">&larr; Back to Portfolio</a>

    <!-- Form Validator Card -->
    <div class="project-card rounded-2xl p-6">
      <h1 class="text-2xl font-bold text-white mb-1">Form Validator</h1>
      <p class="muted-copy text-sm mb-6">Learning form validation for QA testing</p>

      <!-- Validation Form -->
      <form id="validator-form" class="space-y-4">
        <!-- Name Field -->
        <div>
          <label for="name" class="field-label block text-sm font-medium mb-1">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" class="field-input w-full px-4 py-2 border rounded-xl focus:outline-none">
          <p id="name-error" class="text-red-400 text-xs mt-1 hidden"></p>
        </div>

        <!-- Email Field -->
        <div>
          <label for="email" class="field-label block text-sm font-medium mb-1">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" class="field-input w-full px-4 py-2 border rounded-xl focus:outline-none">
          <p id="email-error" class="text-red-400 text-xs mt-1 hidden"></p>
        </div>

        <!-- Phone Field -->
        <div>
          <label for="phone" class="field-label block text-sm font-medium mb-1">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="123-456-7890" class="field-input w-full px-4 py-2 border rounded-xl focus:outline-none">
          <p id="phone-error" class="text-red-400 text-xs mt-1 hidden"></p>
        </div>

        <!-- Password Field with Strength Meter -->
        <div>
          <label for="password" class="field-label block text-sm font-medium mb-1">Password</label>
          <input type="password" id="password" name="password" placeholder="Min 8 characters" class="field-input w-full px-4 py-2 border rounded-xl focus:outline-none">
          <p id="password-error" class="text-red-400 text-xs mt-1 hidden"></p>
          <div class="flex gap-1 mt-2">
            <div id="strength-1" class="h-1 flex-1 bg-white/10 rounded"></div>
            <div id="strength-2" class="h-1 flex-1 bg-white/10 rounded"></div>
            <div id="strength-3" class="h-1 flex-1 bg-white/10 rounded"></div>
            <div id="strength-4" class="h-1 flex-1 bg-white/10 rounded"></div>
          </div>
        </div>

        <button type="submit" class="submit-button w-full text-white py-2.5 rounded-xl transition-colors font-medium">Validate Form</button>
      </form>

      <!-- Success Message -->
      <div id="success-message" class="success-panel hidden mt-4 p-4 border rounded-xl text-sm text-center">All fields passed validation!</div>

      <!-- Error Summary Panel -->
      <div id="validation-summary" class="error-panel hidden mt-4 p-4 border rounded-xl text-sm">
        <p class="font-semibold mb-2">Validation Errors:</p>
        <ul id="error-list" class="list-disc list-inside space-y-1"></ul>
      </div>
    </div>
  </div>

  <!-- Form Validation Logic -->
  <script>
    // DOM Elements
    const form = document.getElementById('validator-form');
    const inputs = {
      name: document.getElementById('name'),
      email: document.getElementById('email'),
      phone: document.getElementById('phone'),
      password: document.getElementById('password')
    };
    const errors = {
      name: document.getElementById('name-error'),
      email: document.getElementById('email-error'),
      phone: document.getElementById('phone-error'),
      password: document.getElementById('password-error')
    };
    const successMsg = document.getElementById('success-message');
    const errorSummary = document.getElementById('validation-summary');
    const errorList = document.getElementById('error-list');

    const validate = {
      name: (v) => v.trim().length >= 2,
      email: (v) => v.includes('@') && v.includes('.') && v.indexOf('@') < v.lastIndexOf('.'),
      phone: (v) => /^\d{10}$/.test(v.replace(/[-\s]/g, '')),
      password: (v) => v.length >= 8
    };

    function checkPasswordStrength(pwd) {
      let score = 0;
      if (pwd.length >= 8) score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[a-z]/.test(pwd)) score++;
      if (/\d/.test(pwd)) score++;
      const bars = [1,2,3,4].map(i => document.getElementById(`strength-${i}`));
      const colors = ['bg-white/10', 'bg-red-400', 'bg-yellow-400', 'bg-green-400', 'bg-green-500'];
      bars.forEach((bar, i) => bar.className = `h-1 flex-1 ${colors[Math.min(score, i + 1) > i ? Math.min(score, 4) : 0]} rounded`);
    }

    function showError(el, msg) {
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function hideError(el) {
      el.classList.add('hidden');
    }

    Object.keys(inputs).forEach(key => {
      inputs[key].addEventListener('input', () => {
        if (key === 'password') checkPasswordStrength(inputs[key].value);
        const valid = validate[key](inputs[key].value);
        inputs[key].classList.toggle('border-green-500', valid);
        inputs[key].classList.toggle('border-red-500', !valid);
        if (valid) hideError(errors[key]);
      });
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      let isValid = true;
      const msgs = [];

      successMsg.classList.add('hidden');
      errorSummary.classList.add('hidden');
      errorList.innerHTML = '';

      const checks = [
        { key: 'name', msg: 'Name must be at least 2 characters' },
        { key: 'email', msg: 'Please enter a valid email' },
        { key: 'phone', msg: 'Phone must be 10 digits' },
        { key: 'password', msg: 'Password must be at least 8 characters' }
      ];

      checks.forEach(({ key, msg }) => {
        if (!validate[key](inputs[key].value)) {
          showError(errors[key], msg);
          msgs.push(msg);
          isValid = false;
        } else {
          hideError(errors[key]);
        }
      });

      if (isValid) {
        successMsg.classList.remove('hidden');
        form.reset();
        checkPasswordStrength('');
        Object.values(inputs).forEach(i => i.classList.remove('border-red-500', 'border-green-500'));
      } else {
        errorSummary.classList.remove('hidden');
        msgs.forEach(m => {
          const li = document.createElement('li');
          li.textContent = m;
          errorList.appendChild(li);
        });
      }
    });
  </script>
</body>
</html>
